<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>buding settings</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body data-page="settings">
    <div class="admin-app">
      <header class="top-nav">
        <a class="wordmark" href="/static/index.html">
          <span>b</span>
          <strong>buding</strong>
        </a>

        <nav class="top-links">
          <a href="/static/index.html">对话</a>
          <a href="/static/services.html">服务</a>
          <a class="active" href="/static/settings.html">配置</a>
        </nav>

        <span class="connection-pill" id="systemState">静态预览</span>
      </header>

      <main class="admin-stage">
        <section class="admin-head">
          <div>
            <p class="eyebrow">Configuration</p>
            <h1>配置中心</h1>
          </div>
          <button class="primary-action" id="saveAllBtn" type="button">
            <i data-lucide="save"></i>
            应用配置
          </button>
        </section>

        <section class="settings-layout">
          <article class="settings-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Runtime</p>
                <h2>对话参数</h2>
              </div>
            </div>

            <div class="settings-block">
              <h3>路由</h3>
              <div class="form-grid">
                <label><span>ASR Mode</span><select id="asrMode"><option value="transcription">transcription</option><option value="chat">chat</option></select></label>
                <label><span>ASR Model</span><input id="asrModel" type="text" /></label>
                <label class="wide"><span>ASR URL</span><input id="asrUrl" type="text" /></label>
                <label><span>LLM Model</span><input id="llmModel" type="text" /></label>
                <label class="wide"><span>LLM URL</span><input id="llmUrl" type="text" /></label>
                <label class="wide"><span>TTS URL</span><input id="ttsUrl" type="text" /></label>
              </div>
            </div>

            <div class="settings-block">
              <h3>生成</h3>
              <div class="form-grid compact">
                <label><span>Temperature</span><input id="temperature" type="number" min="0" max="1.5" step="0.01" /></label>
                <label><span>Max Tokens</span><input id="maxTokens" type="number" min="32" max="4096" step="1" /></label>
                <label><span>History Turns</span><input id="historyTurns" type="number" min="1" max="20" step="1" /></label>
                <label><span>TTS Speed</span><input id="ttsSpeed" type="number" min="0.7" max="1.5" step="0.01" /></label>
                <label><span>TTS Seed</span><input id="ttsSeed" type="number" min="0" step="1" /></label>
                <label><span>TTS Volume</span><input id="ttsVolume" type="number" min="0.05" max="1.5" step="0.01" /></label>
                <label><span>TTS Fade ms</span><input id="ttsFadeMs" type="number" min="0" max="40" step="1" /></label>
              </div>
            </div>

            <div class="settings-block">
              <h3>Prompt</h3>
              <div class="form-grid">
                <label class="wide"><span>System Prompt</span><textarea class="prompt-textarea" id="systemPrompt"></textarea></label>
              </div>
            </div>

            <div class="settings-block">
              <h3>VAD</h3>
              <div class="form-grid compact">
                <label><span>Threshold</span><input id="vadThreshold" type="number" min="0.1" max="0.9" step="0.01" /></label>
                <label><span>Silence ms</span><input id="vadMinSilence" type="number" min="120" max="1500" step="10" /></label>
                <label><span>Speech Pad ms</span><input id="vadSpeechPad" type="number" min="0" max="500" step="10" /></label>
                <label><span>Pre Speech ms</span><input id="preSpeech" type="number" min="0" max="800" step="10" /></label>
                <label><span>Min Utterance ms</span><input id="minUtterance" type="number" min="100" max="1500" step="10" /></label>
                <label><span>Max Utterance sec</span><input id="maxUtterance" type="number" min="2" max="60" step="1" /></label>
              </div>
            </div>
          </article>

          <article class="settings-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Launch profiles</p>
                <h2>服务启动命令</h2>
              </div>
            </div>
            <div class="profile-list" id="profileList"></div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
