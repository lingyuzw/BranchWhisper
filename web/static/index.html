<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoveChoice · 对话</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/dashboard.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script type="module" src="/static/js/main.js" defer></script>
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <!-- header -->
      <header class="topbar">
        <a class="brand" href="/static/index.html">
          <span class="brand-mark">LC</span>
          <span><strong>LoveChoice</strong><small>Voice Console</small></span>
        </a>

        <nav class="nav-tabs">
          <a class="active" href="/static/index.html"><i data-lucide="messages-square"></i>对话</a>
          <a href="/static/services.html"><i data-lucide="activity"></i>服务</a>
          <a href="/static/settings.html"><i data-lucide="settings-2"></i>配置</a>
        </nav>

        <div class="topbar-status">
          <button class="icon-button" id="memoryTriggerBtn" type="button" title="记忆管理">
            <i data-lucide="brain"></i>
          </button>
          <span class="status-pill" id="dialogState">待机</span>
        </div>
      </header>

      <!-- main: 2-column -->
      <main class="voice-console">
        <!-- left sidebar -->
        <aside class="sidebar">
          <button class="primary-action full" id="newConversationBtn" type="button">
            <i data-lucide="plus"></i> 新建对话
          </button>

          <div class="conversation-rail">
            <div class="rail-head">
              <p class="eyebrow">Sessions</p>
            </div>
            <div class="conversation-list" id="conversationList"></div>
          </div>

          <!-- compact pipeline indicator -->
          <div class="pipeline-compact" id="pipelineCompact">
            <div class="pipeline-row" data-stage="vad"><span class="pdot"></span><strong>VAD</strong><small id="plVadLabel">idle</small></div>
            <div class="pipeline-row" data-stage="asr"><span class="pdot"></span><strong>ASR</strong><small>--</small></div>
            <div class="pipeline-row" data-stage="llm"><span class="pdot"></span><strong>LLM</strong><small>--</small></div>
            <div class="pipeline-row" data-stage="tts"><span class="pdot"></span><strong>TTS</strong><small>--</small></div>
          </div>

          <div class="runtime-chips sidebar-chips">
            <span><b>ASR</b><strong id="asrMetric">--</strong></span>
            <span><b>LLM</b><strong id="llmMetric">--</strong></span>
            <span><b>TTS</b><strong id="ttsMetric">--</strong></span>
          </div>
        </aside>

        <!-- main chat area -->
        <section class="chat-panel">
          <div class="chat-header">
            <div>
              <p class="eyebrow">Active Thread</p>
              <strong id="conversationTitle">新的对话</strong>
            </div>
            <span id="conversationMeta">本次 · 0 条</span>
          </div>

          <div class="transcript" id="transcript" aria-live="polite"></div>

          <!-- listen strip -->
          <div class="listen-strip">
            <div class="listen-meta">
              <span id="vadLabel">idle</span>
              <span id="levelText">0%</span>
            </div>
            <canvas id="scopeCanvas" width="1280" height="160"></canvas>
            <div class="level-track"><span class="level-bar" id="levelBar"></span></div>
          </div>

          <!-- composer -->
          <div class="composer">
            <button class="voice-button" id="micBtn" type="button" title="麦克风"><i data-lucide="mic"></i></button>
            <textarea id="textInput" rows="1" autocomplete="off" placeholder="输入文字，或打开麦克风开始说话"></textarea>
            <button class="send-button" id="sendBtn" type="button" title="发送"><i data-lucide="send"></i></button>
            <button class="icon-button" id="interruptBtn" type="button" title="打断"><i data-lucide="octagon-x"></i></button>
            <button class="icon-button" id="resetBtn" type="button" title="新对话"><i data-lucide="square-pen"></i></button>
          </div>
        </section>
      </main>
    </div>

    <!-- memory modal (hidden by default) -->
    <div class="modal-overlay" id="memoryModal" hidden>
      <div class="modal-panel">
        <div class="modal-head">
          <h2>记忆管理</h2>
          <button class="icon-button modal-close" type="button"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <div class="memory-add-row">
            <input id="memoryAddInput" type="text" placeholder="添加新记忆..." autocomplete="off" />
            <button class="primary-action" id="memoryAddBtn" type="button">添加</button>
          </div>
          <div class="memory-list-compact" id="memoryModalList"></div>
        </div>
      </div>
    </div>
  </body>
</html>
