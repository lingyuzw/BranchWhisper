<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>buding</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body data-page="dashboard">
    <div class="chat-app">
      <header class="top-nav">
        <a class="wordmark" href="/static/index.html">
          <span>b</span>
          <strong>buding</strong>
        </a>

        <nav class="top-links">
          <a class="active" href="/static/index.html">对话</a>
          <a href="/static/services.html">服务</a>
          <a href="/static/settings.html">配置</a>
        </nav>

        <span class="connection-pill" id="dialogState">连接中</span>
      </header>

      <main class="chat-stage">
        <aside class="conversation-rail">
          <div class="rail-head">
            <div>
              <p class="eyebrow">sessions</p>
              <h2>对话记录</h2>
            </div>
            <button class="icon-button" id="newConversationBtn" type="button" title="新对话">
              <i data-lucide="plus"></i>
            </button>
          </div>
          <div class="conversation-list" id="conversationList"></div>
        </aside>

        <section class="chat-workspace">
          <section class="chat-hero">
            <div>
              <p class="eyebrow">local voice session</p>
              <h1>今天聊什么？</h1>
            </div>
            <div class="runtime-chips">
              <span><b>ASR</b><strong id="asrMetric">--</strong></span>
              <span><b>首字</b><strong id="llmMetric">--</strong></span>
              <span><b>首音</b><strong id="ttsMetric">--</strong></span>
            </div>
          </section>

          <section class="conversation-shell">
            <div class="conversation-current">
              <div>
                <p class="eyebrow">active thread</p>
                <strong id="conversationTitle">新的对话</strong>
              </div>
              <span id="conversationMeta">本次 · 0 条</span>
            </div>

            <div class="listen-strip">
              <div class="listen-meta">
                <span id="vadLabel">idle</span>
                <span id="levelText">0%</span>
              </div>
              <canvas id="scopeCanvas" width="1280" height="160"></canvas>
              <div class="level-track"><span id="levelBar"></span></div>
            </div>

            <div class="transcript" id="transcript" aria-live="polite"></div>

            <div class="composer">
              <button class="voice-button" id="micBtn" type="button" title="麦克风">
                <i data-lucide="mic"></i>
              </button>
              <textarea id="textInput" rows="1" autocomplete="off" placeholder="输入文字，或者按麦克风开始说话"></textarea>
              <button class="send-button" id="sendBtn" type="button" title="发送">
                <i data-lucide="send"></i>
              </button>
              <button class="icon-button reset" id="resetBtn" type="button" title="新对话">
                <i data-lucide="square-pen"></i>
              </button>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
