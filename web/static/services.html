<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoveChoice · 服务</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/services.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script type="module" src="/static/js/main.js" defer></script>
  </head>
  <body data-page="services">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/static/index.html">
          <span class="brand-mark">LC</span>
          <span><strong>LoveChoice</strong><small>Voice Console</small></span>
        </a>

        <nav class="nav-tabs">
          <a href="/static/index.html"><i data-lucide="messages-square"></i>对话</a>
          <a class="active" href="/static/services.html"><i data-lucide="activity"></i>服务</a>
          <a href="/static/settings.html"><i data-lucide="settings-2"></i>配置</a>
        </nav>

        <div class="topbar-status">
          <span class="status-pill" id="systemState">连接中</span>
        </div>
      </header>

      <main class="ops-page">
        <!-- header row -->
        <section class="page-head">
          <div>
            <p class="eyebrow">Service Orchestration</p>
            <h1>服务编排</h1>
          </div>
          <div class="head-actions">
            <button class="primary-action" id="startAllBtn" type="button"><i data-lucide="power"></i>一键启动</button>
            <button class="secondary-action" id="stopAllBtn" type="button"><i data-lucide="square"></i>停止全部</button>
            <button class="secondary-action" id="restartAllBtn" type="button"><i data-lucide="refresh-ccw"></i>重启全部</button>
            <button class="icon-button" id="healthBtn" type="button" title="刷新状态"><i data-lucide="refresh-cw"></i></button>
          </div>
        </section>

        <!-- service cards row -->
        <div class="service-list" id="serviceCards"></div>

        <!-- logs section -->
        <section class="logs-section">
          <div class="logs-head">
            <div>
              <p class="eyebrow">Live Logs</p>
              <h2>运行日志</h2>
            </div>
            <div class="inline-actions">
              <div class="log-tabs" id="logTabs"></div>
              <button class="icon-button" id="refreshLogsBtn" type="button" title="刷新"><i data-lucide="rotate-cw"></i></button>
              <button class="icon-button" id="copyLogBtn" type="button" title="复制"><i data-lucide="copy"></i></button>
              <button class="icon-button" id="downloadLogBtn" type="button" title="下载"><i data-lucide="download"></i></button>
              <button class="icon-button" id="clearAllLogsBtn" type="button" title="清空日志"><i data-lucide="trash-2"></i></button>
            </div>
          </div>
          <pre class="log-viewer" id="logOutput">选择一个服务查看日志。</pre>
        </section>
      </main>
    </div>
  </body>
</html>
